name: Release Installer

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: desktop-installer/package-lock.json

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $package = Get-Content "desktop-installer/package.json" | ConvertFrom-Json
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          if ($package.version -ne $tagVersion) {
            throw "Tag version $tagVersion does not match desktop-installer/package.json version $($package.version)."
          }

      - name: Install dependencies
        working-directory: desktop-installer
        run: npm ci

      - name: Build and publish installer
        working-directory: desktop-installer
        run: npm run dist:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
